<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Поиск с подсказками</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .search-container {
            width: 100%;
            max-width: 600px;
        }
        
        .search-wrapper {
            position: relative;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .search-box {
            width: 100%;
            padding: 18px 25px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            outline: none;
            background: transparent;
        }
        
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            margin-top: 5px;
        }
        
        .suggestions-list.active {
            display: block;
        }
        
        .suggestion-item {
            padding: 12px 25px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .suggestion-item:hover {
            background: #f5f5f5;
        }
        
        .suggestion-item.selected {
            background: #e8f0fe;
        }
        
        .suggestion-icon {
            color: #9aa0a6;
            font-size: 18px;
        }
        
        .suggestion-text {
            flex: 1;
            color: #202124;
        }
        
        .loading {
            padding: 12px 25px;
            color: #70757a;
            font-size: 14px;
        }
        
        .clear-button {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #70757a;
            font-size: 18px;
            display: none;
        }
        
        .clear-button:hover {
            color: #202124;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" 
                   id="searchInput" 
                   class="search-box" 
                   placeholder="Поиск в Google..."
                   autocomplete="off">
            <button class="clear-button" id="clearButton">✕</button>
            <div id="suggestions" class="suggestions-list"></div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const suggestionsDiv = document.getElementById('suggestions');
        const clearButton = document.getElementById('clearButton');
        let selectedIndex = -1;
        let currentSuggestions = [];
        let currentRequest = null;

        // Функция для получения подсказок через JSONP
        function getGoogleSuggestions(query) {
            if (query.length < 2) {
                suggestionsDiv.classList.remove('active');
                return;
            }

            // Показываем индикатор загрузки
            suggestionsDiv.innerHTML = '<div class="loading">Загрузка подсказок...</div>';
            suggestionsDiv.classList.add('active');

            // Удаляем предыдущий скрипт
            if (currentRequest) {
                document.body.removeChild(currentRequest);
            }

            // Создаем JSONP запрос
            const script = document.createElement('script');
            const callbackName = 'googleSuggestCallback_' + Date.now();
            
            window[callbackName] = function(data) {
                if (data && data[1]) {
                    currentSuggestions = data[1];
                    displaySuggestions(data[1]);
                } else {
                    suggestionsDiv.classList.remove('active');
                }
                delete window[callbackName];
                document.body.removeChild(script);
            };

            script.src = `https://clients1.google.com/complete/search?client=chrome&q=${encodeURIComponent(query)}&callback=${callbackName}`;
            script.onerror = function() {
                suggestionsDiv.innerHTML = '<div class="loading">Ошибка загрузки</div>';
                setTimeout(() => {
                    suggestionsDiv.classList.remove('active');
                }, 1000);
            };
            
            document.body.appendChild(script);
            currentRequest = script;
        }

        // Отображение подсказок
        function displaySuggestions(suggestions) {
            if (!suggestions || suggestions.length === 0) {
                suggestionsDiv.classList.remove('active');
                return;
            }

            suggestionsDiv.innerHTML = '';
            suggestions.forEach((suggestion, index) => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `
                    <span class="suggestion-icon">🔍</span>
                    <span class="suggestion-text">${escapeHtml(suggestion)}</span>
                `;
                div.onclick = () => {
                    searchInput.value = suggestion;
                    suggestionsDiv.classList.remove('active');
                    // Открываем поиск Google
                    window.open(`https://www.google.com/search?q=${encodeURIComponent(suggestion)}`, '_blank');
                };
                suggestionsDiv.appendChild(div);
            });
            suggestionsDiv.classList.add('active');
            selectedIndex = -1;
        }

        // Функция для экранирования HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Debounce для оптимизации
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            
            // Показываем кнопку очистки
            clearButton.style.display = query ? 'block' : 'none';
            
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                getGoogleSuggestions(query);
            }, 300);
        });

        // Очистка поля
        clearButton.addEventListener('click', () => {
            searchInput.value = '';
            suggestionsDiv.classList.remove('active');
            clearButton.style.display = 'none';
            searchInput.focus();
        });

        // Клавиатурная навигация
        searchInput.addEventListener('keydown', (e) => {
            const items = document.querySelectorAll('.suggestion-item');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (items.length > 0) {
                    selectedIndex = (selectedIndex + 1) % items.length;
                    updateSelectedItem(items);
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (items.length > 0) {
                    selectedIndex = selectedIndex <= 0 ? items.length - 1 : selectedIndex - 1;
                    updateSelectedItem(items);
                }
            } else if (e.key === 'Enter') {
                if (selectedIndex >= 0 && currentSuggestions[selectedIndex]) {
                    e.preventDefault();
                    const value = currentSuggestions[selectedIndex];
                    searchInput.value = value;
                    suggestionsDiv.classList.remove('active');
                    window.open(`https://www.google.com/search?q=${encodeURIComponent(value)}`, '_blank');
                } else if (searchInput.value.trim()) {
                    suggestionsDiv.classList.remove('active');
                    window.open(`https://www.google.com/search?q=${encodeURIComponent(searchInput.value)}`, '_blank');
                }
            } else if (e.key === 'Escape') {
                suggestionsDiv.classList.remove('active');
                selectedIndex = -1;
                searchInput.blur();
            }
        });

        function updateSelectedItem(items) {
            items.forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('selected');
                    // Автоматически подставляем выбранный вариант в поле ввода
                    searchInput.value = currentSuggestions[index];
                } else {
                    item.classList.remove('selected');
                }
            });
            
            // Прокрутка к выбранному элементу
            if (items[selectedIndex]) {
                items[selectedIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        // Закрытие подсказок при клике вне
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                suggestionsDiv.classList.remove('active');
                selectedIndex = -1;
            }
        });

        // Фокус на поле ввода при загрузке
        searchInput.focus();
    </script>
</body>
</html>
